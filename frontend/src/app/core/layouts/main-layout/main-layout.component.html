<div class="flex flex-col h-screen bg-slate-50 dark:bg-black transition-colors duration-200">
  <!-- Topbar -->
  <header
    class="h-16 flex items-center justify-between px-6 bg-white dark:bg-zinc-900 border-b border-slate-200 dark:border-zinc-800 shadow-sm shrink-0 z-10"
  >
    <div class="flex items-center">
      <!-- Mobile menu button placeholder -->
      <button
        class="md:hidden mr-4 text-slate-500 hover:text-slate-700 dark:text-zinc-400 dark:hover:text-slate-200"
        (click)="toggleMobileMenu()"
        [attr.aria-expanded]="mobileMenuOpen"
        [attr.aria-label]="mobileMenuOpen ? 'Close menu' : 'Open menu'"
      >
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"
          ></path>
        </svg>
      </button>

      <!-- Logo Container -->
      <div class="flex items-center md:w-[14.5rem]">
        <h1 class="text-xl font-bold text-slate-800 dark:text-white tracking-wide">Polystore</h1>
      </div>
    </div>

    <div class="flex items-center gap-4">
      <app-theme-toggle></app-theme-toggle>

      <!-- User Profile -->
      <div class="flex items-center gap-3 pl-4 border-l border-slate-200 dark:border-zinc-700">
        <div class="flex flex-col text-right hidden sm:flex">
          <span class="text-sm font-medium text-slate-900 dark:text-white leading-tight">
            @if (authService.currentUser()?.firstName) {
              {{ authService.currentUser()?.firstName }} {{ authService.currentUser()?.lastName }}
            } @else {
              User
            }
          </span>
          <span class="text-xs text-slate-500 dark:text-zinc-400 leading-tight">
            {{ authService.currentUser()?.email }}
          </span>
        </div>
        <div
          class="w-9 h-9 rounded-full flex items-center justify-center text-white font-semibold shadow-sm"
          [ngClass]="getAvatarColor()"
        >
          {{ getInitials() }}
        </div>

        <!-- Logout Button -->
        <button
          (click)="logout()"
          class="ml-1 p-1.5 text-slate-400 hover:text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 dark:hover:text-red-400 rounded-md transition-colors"
          title="Logout"
          aria-label="Logout"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
            ></path>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Bottom Content Area -->
  <div class="flex flex-1 overflow-hidden">
    <!-- Mobile Menu -->
    @if (mobileMenuOpen) {
      <nav
        class="md:hidden absolute top-16 left-0 right-0 bg-white dark:bg-zinc-900 border-b border-slate-200 dark:border-zinc-800 shadow-md z-20 flex flex-col p-4 space-y-2"
      >
        <a
          routerLink="/admin"
          routerLinkActive="bg-poly-100 text-poly-800 dark:bg-poly-900/60 dark:text-poly-100"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="toggleMobileMenu()"
          class="flex items-center gap-3 px-4 py-2 rounded-md font-medium transition-colors hover:bg-poly-50 dark:hover:bg-zinc-800 text-slate-700 dark:text-zinc-300"
        >
          <svg class="w-5 h-5 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"
            ></path>
          </svg>
          Dashboard
        </a>
        <a
          routerLink="/admin/users"
          routerLinkActive="bg-poly-100 text-poly-800 dark:bg-poly-900/60 dark:text-poly-100"
          (click)="toggleMobileMenu()"
          class="flex items-center gap-3 px-4 py-2 rounded-md font-medium transition-colors hover:bg-poly-50 dark:hover:bg-zinc-800 text-slate-700 dark:text-zinc-300"
        >
          <svg class="w-5 h-5 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"
            ></path>
          </svg>
          Users
        </a>
      </nav>
    }

    <!-- Sidebar -->
    <aside
      class="hidden md:flex flex-col w-64 bg-white dark:bg-zinc-900 border-r border-slate-200 dark:border-zinc-800 h-full"
    >
      <nav class="flex-1 p-4 overflow-y-auto space-y-2">
        <a
          routerLink="/admin"
          routerLinkActive="bg-poly-100 text-poly-800 dark:bg-poly-900/60 dark:text-poly-100"
          [routerLinkActiveOptions]="{ exact: true }"
          class="flex items-center gap-3 px-4 py-2 rounded-md font-medium transition-colors hover:bg-poly-50 dark:hover:bg-zinc-800 text-slate-700 dark:text-zinc-300"
        >
          <svg class="w-5 h-5 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"
            ></path>
          </svg>
          Dashboard
        </a>
        <a
          routerLink="/admin/users"
          routerLinkActive="bg-poly-100 text-poly-800 dark:bg-poly-900/60 dark:text-poly-100"
          class="flex items-center gap-3 px-4 py-2 rounded-md font-medium transition-colors hover:bg-poly-50 dark:hover:bg-zinc-800 text-slate-700 dark:text-zinc-300"
        >
          <svg class="w-5 h-5 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"
            ></path>
          </svg>
          Users
        </a>
      </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 overflow-x-hidden overflow-y-auto bg-slate-50 dark:bg-black p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
